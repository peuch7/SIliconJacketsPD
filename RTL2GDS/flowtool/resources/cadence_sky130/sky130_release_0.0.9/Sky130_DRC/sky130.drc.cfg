// Version 0.0_2.8  June 17, 2025     

#tcl
[tcl]
//------------------------------------------------------------------------------------------

configoption -type boolean -active drc -text "Turn OFF rules that may be inaccurate due to out-of-date DRM information" 	-option FALSEOFF -default "0" -hidden 0
configoption -type label -active drc -text "     (these rules are on by default and may produce false violations)"  

    configoption -type separator
//------------------------------------------------------------------------------------------

configoption -type boolean -active drc -text "Use Alternate SRAM Rules (default is OFF)" -option SRAM -default "0" -hidden 0
configoption -type label -active drc -text "These are the affected rules and alternate implementation: "  
configoption -type label -active drc -text "   licon.4a: licon in areaid.ce must overlap LI"  
configoption -type label -active drc -text "   licon.4b: licon in areaid.ce must overlap (poly or diff or tap)"  
configoption -type label -active drc -text "   mcon.cover.1: mcon in areaid.ce must overlap LI"  
configoption -type label -active drc -text "** WARNING: This switch is for debugging purposes only, errors may be missed **"  
	
    configoption -type separator
//------------------------------------------------------------------------------------------

configoption -type boolean -active drc -text "Turn Off Density Rules (default is ON)" -option NODEN -default "0" -hidden 0

    configoption -type separator
//------------------------------------------------------------------------------------------

configoption -type label -active drc -text " Recommended Rules (RC,RR) & Guidelines (NC)"  
configoption -type boolean -active drc -text "Run Recommended Rules (default is OFF)" -option RC -default "0" -hidden 0
configoption -type boolean -active drc -text "Run Guideline Rules (default is OFF)" -option NC -default "0" -hidden 0

    configoption -type separator
//------------------------------------------------------------------------------------------

configoption -type label -active drc -text " Optional Switches "  

configoption -type boolean -active drc -text "Front end layers (below LI)" 	-option frontend -default "0" -hidden 0
configoption -type boolean -active drc -text "Back end layers (LI & above)" 	-option backend -default "0" -hidden 0

    configoption -type separator
//------------------------------------------------------------------------------------------

[/tcl]
